<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="../../" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neth BookPoint | Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="login-screen">
      <div class="login-card">
        <div class="login-left">
          <div
            style="
              position: absolute;
              top: 0;
              right: 0;
              width: 16rem;
              height: 16rem;
              background: rgba(204, 149, 0, 0.1);
              border-radius: 50%;
              transform: translate(50%, -50%);
              filter: blur(64px);
            "
          ></div>
          <div style="position: relative; z-home: 10">
            <h2 class="text-5xl font-bold mb-6" style="line-height: 1.2">
              Welcome to<br /><span class="text-gold">Neth BookPoint!</span>
            </h2>
            <p
              class="text-xl"
              style="color: var(--gray-light); line-height: 1.6"
            >
              Discover a seamless way to sell your books and unlock exclusive
              benefits.
            </p>
          </div>
        </div>

        <div class="login-right">
          <div class="mb-12">
            <h3 class="text-3xl font-bold mb-2">Login to Your Account!</h3>
            <p class="text-gray">
              Enter your credentials to access your dashboard.
            </p>
          </div>

          <form
            onsubmit="
              event.preventDefault();
              Bookstore.auth.login(document.getElementById('email').value);
            "
            class="flex flex-col gap-6"
          >
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input
                type="email"
                id="email"
                placeholder="user1@bookpoint.com"
                class="form-input"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input
                type="password"
                placeholder="••••••••"
                class="form-input"
                required
              />
            </div>
            <button
              type="submit"
              class="btn btn-gold w-full"
              style="
                justify-content: center;
                padding: 1.25rem;
                font-size: 1.25rem;
              "
            >
              LOGIN
            </button>
          </form>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
