<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="../../" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neth BookPoint | Shop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar sticky top-0 z-50">
      <div
        class="nav-top"
        style="background-image: url(&quot;assets/bookstore/logo.png&quot;)"
      >
        <div class="flex items-center gap-4">
          <a
            href="pages/HomePage/home.html"
            class="flex items-center gap-4"
            style="text-decoration: none"
          >
            <img
              src="assets/bookstore/nav-bg.png"
              alt="Logo"
              style="height: 4rem; width: 4rem; object-fit: contain"
            />
            <h1 class="text-gold" style="font-size: 1.5rem; line-height: 1.2">
              NETH<br />BOOKPOINT
            </h1>
          </a>
        </div>
        <div class="nav-links">
          <a href="pages/HomePage/home.html">Home</a>
          <a href="pages/AboutPage/about.html">About</a>
          <a href="pages/ShopPage/shop.html">Shop</a>
          <a href="#">Delivery Team</a>
          <a href="#">Sellers</a>
        </div>
        <div class="nav-actions">
          <div id="user-profile"></div>
          <a
            href="pages/CartPage/cart.html"
            class="text-white relative"
            style="display: flex; align-items: center"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="8" cy="21" r="1" />
              <circle cx="19" cy="21" r="1" />
              <path
                d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"
              />
            </svg>
            <span id="cart-badge" class="cart-badge" style="display: none"
              >0</span
            >
          </a>
        </div>
      </div>
    </nav>

    <div class="container py-12">
      <div
        class="flex flex-col md:flex-row items-center justify-between gap-8 mb-12"
      >
        <div>
          <h2 class="text-4xl font-bold">Explore All Books</h2>
          <p class="text-gray">
            Find your next favorite story from our extensive collection.
          </p>
        </div>
        <div class="search-bar" style="max-width: 24rem; margin: 0">
          <input
            type="text"
            placeholder="Search books..."
            class="search-input"
            style="height: 3rem; padding-right: 4rem"
          />
          <button class="search-btn" style="padding: 0 1rem">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
          </button>
        </div>
      </div>

      <div id="shop-grid" class="grid grid-cols-4"></div>
    </div>

    <script src="main.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const grid = document.getElementById("shop-grid");
        if (grid) {
          grid.innerHTML = Bookstore.books
            .map(
              (book) => `
                    <div class="book-card">
                        <a href="pages/BookDetailsPage/bookdetails.html?id=${book.id}" class="book-img-container">
                    <img src="${book.image}" alt="${book.title}" class="book-img"></a>
                        <div class="book-info">
                            <h3 class="book-title">${book.title}</h3>
                            <p class="book-author">${book.author}</p>
                            <div class="book-price-row">
                                <span class="book-price">${book.price}</span>
                                <button onclick="Bookstore.cart.add('${book.id}')" class="add-to-cart-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `,
            )
            .join("");
        }
      });
    </script>
  </body>
</html>
